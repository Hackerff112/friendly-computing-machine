name: SSH-Termux-Perfect
on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up SSH and Ngrok
      env:
        NGROK_AUTH_TOKEN: "2Km7kgNws0g9aXtH4ZzdxzK6R9Z_2qGLQM9mJNeP5XLBfbTbf"
      run: |
        # 1. تثبيت خادم SSH وإعداده بكلمة مرور
        sudo apt-get update && sudo apt-get install -y openssh-server
        echo "root:rootpassword" | sudo chpasswd
        sudo mkdir -p /var/run/sshd
        
        # تفعيل الدخول بكلمة مرور للـ root
        sudo sed -i 's/#PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config
        sudo sed -i 's/#PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo service ssh restart
        
        # 2. تحميل وتثبيت Ngrok عبر السكريبت الرسمي المضمون
        curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.dev/ngrok.asc >/dev/null
        echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.dev/ngrok.list
        sudo apt-get update && sudo apt-get install ngrok
        
        # 3. تفعيل التوكن وتشغيل النفق لمنفذ الـ SSH
        ngrok config add-authtoken $NGROK_AUTH_TOKEN
        ngrok tcp 22 --log=stdout > ngrok.log &
        
        # الانتظار 15 ثانية لضمان توليد البيانات
        sleep 15
        
        # 4. استخراج أمر الـ SSH النظيف والمباشر لـ Termux
        echo "=========================================================="
        echo "💻 انسخ هذا الأمر وضعه في Termux مباشرة:"
        echo "=========================================================="
        curl -s http://localhost:4040/api/tunnels | grep -o 'tcp://[^"]*' | sed 's/tcp:\/\//ssh root@/' | sed 's/:/ -p /'
        echo "=========================================================="
        
        # إبقاء السيرفر حياً لمدة 6 ساعات
        sleep 21600
