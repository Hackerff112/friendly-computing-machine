name: SSH-Cloudflare-Termux-Pure
on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Pure SSH Tunnel
      run: |
        # 1. تثبيت وتجهيز خادم SSH وتعيين الباسورد والملفات الأساسية
        sudo apt-get update && sudo apt-get install -y openssh-server
        echo "root:rootpassword" | sudo chpasswd
        sudo mkdir -p /var/run/sshd
        
        # إعدادات السماح للـ Root بكلمة مرور
        sudo sed -i 's/#PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config
        sudo sed -i 's/#PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo service ssh restart
        
        # 2. تحميل وتثبيت أداة Cloudflare الرسمية للسيرفر
        curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
        sudo dpkg -i cloudflared.deb
        
        # 3. تشغيل النفق المخصص لبروتوكول الـ SSH (منفذ 22)
        cloudflared tunnel --url ssh://localhost:22 > cloudflare.log 2>&1 &
        
        # الانتظار 15 ثانية لضمان استقرار الاتصال وجلب الرابط
        sleep 15
        
        # 4. استخراج الرابط بطريقة ذكية
        echo "=========================================================="
        echo "🔗 رابط السيرفر الخاص بك هو:"
        grep -o 'https://[-a-get-zero-trust-trycloudflare.com]*\.trycloudflare\.com' cloudflare.log | head -n 1 | sed 's/https:\/\///'
        echo "=========================================================="
        
        # إبقاء السيرفر حياً لمدة 6 ساعات
        sleep 21600
