name: SSH-Cloudflare-Termux-Final
on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Web SSH Server
      run: |
        # 1. تثبيت وتجهيز خادم SSH وتعيين كلمة المرور
        sudo apt-get update && sudo apt-get install -y openssh-server
        echo "root:rootpassword" | sudo chpasswd
        sudo mkdir -p /var/run/sshd
        
        # 2. تحميل وتثبيت أداة ttyd لتحويل الـ SSH إلى صفحة ويب
        sudo wget -O /usr/local/bin/ttyd https://github.com/tsl0922/ttyd/releases/download/1.7.7/ttyd.x86_64
        sudo chmod +x /usr/local/bin/ttyd
        ttyd -p 7681 bash &
        
        # 3. تحميل وتثبيت أداة Cloudflare
        curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
        sudo dpkg -i cloudflared.deb
        
        # 4. تشغيل نفق Cloudflare وتوجيهه لمنفذ الـ ويب
        cloudflared tunnel --url http://localhost:7681 > cloudflare.log 2>&1 &
        
        # الانتظار 15 ثانية لضمان استقرار الاتصال وتوليد الرابط
        echo "=== جاري تشغيل النفق وتوليد الرابط... انتظر 15 ثانية ==="
        sleep 15
        
        # 5. طباعة الرابط بوضوح
        echo "=========================================================="
        echo "🔗 انسخ الرابط أدناه وافتحه في المتصفح أو في Termux الجديد:"
        echo "=========================================================="
        grep -o 'https://[-a-get-zero-trust-trycloudflare.com]*\.trycloudflare\.com' cloudflare.log | head -n 1
        echo "=========================================================="
        
        # إبقاء السيرفر حياً لمدة 6 ساعات
        sleep 21600
