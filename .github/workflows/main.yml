name: SSH-Termux-Fixed-Final
on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up SSH and Ngrok
      env:
        NGROK_AUTH_TOKEN: "2Km7kgNws0g9aXtH4ZzdxzK6R9Z_2qGLQM9mJNeP5XLBfbTbf"
      run: |
        # 1. إعداد وتثبيت خادم SSH وتفعيل كلمة المرور
        sudo apt-get update && sudo apt-get install -y openssh-server unzip
        echo "root:rootpassword" | sudo chpasswd
        sudo mkdir -p /var/run/sshd
        
        sudo sed -i 's/#PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config
        sudo sed -i 's/#PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo service ssh restart
        
        # 2. تحميل وتثبيت أداة Ngrok الثنائية مباشرة (تجنباً لمشاكل apt)
        wget -q https://bin.equinox.io/c/b3419c4fe1f/ngrok-stable-linux-amd64.zip
        unzip -q ngrok-stable-linux-amd64.zip
        sudo mv ngrok /usr/local/bin/
        
        # 3. إعداد التوكن وتشغيل النفق في الخلفية لمنفذ الـ SSH
        ngrok config add-authtoken $NGROK_AUTH_TOKEN
        ngrok tcp 22 > /dev/null &
        
        # الانتظار 12 ثانية لضمان استقرار الاتصال وتوليد الرابط
        echo "=== جاري الاتصال بخوادم Ngrok وتوليد الأمر... انتظر 12 ثانية ==="
        sleep 12
        
        # 4. طباعة أمر الاتصال المباشر لـ Termux
        echo "=========================================================="
        echo "💻 انسخ هذا الأمر وضعه في Termux مباشرة:"
        echo "=========================================================="
        curl -s http://localhost:4040/api/tunnels | grep -o 'tcp://[^"]*' | sed 's/tcp:\/\//ssh root@/' | sed 's/:/ -p /'
        echo "=========================================================="
        
        # إبقاء السيرفر حياً لمدة 6 ساعات
        sleep 21600
        
